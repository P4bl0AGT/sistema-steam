# Configuracion de demostracion. Puede sobrescribirse con -Dsteam.config=...
# o mediante las variables de entorno indicadas en docs/GUIA_DEMO.md.
steam.bind.host=0.0.0.0
steam.advertised.host=localhost
steam.proxies=localhost:8080,localhost:8085

steam.sesiones.1.host=localhost
steam.sesiones.2.host=localhost
steam.juegos.1.host=localhost
steam.juegos.2.host=localhost
steam.mensajeria.1.host=localhost
steam.mensajeria.2.host=localhost

steam.connect.timeout.ms=3000
steam.read.timeout.ms=5000
steam.max.message.bytes=65536
steam.max.replication.bytes=16777216
steam.request.max.age.ms=60000
steam.request.cache.ttl.ms=120000
steam.token.ttl.ms=1800000
steam.mutex.lease.ms=15000
steam.replication.interval.ms=5000

# Secreto de DEMOSTRACION, externo al codigo. Cambiar antes de usar en otra red.
steam.control.secret=change-this-demo-secret

# TLS queda disponible y verificable, pero desactivado en el perfil base para que
# el primer arranque no dependa de certificados. Use config/steam-tls.properties.
steam.tls.enabled=false
steam.tls.client.auth=false
